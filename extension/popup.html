<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f7f9fc;
    }
    h2 {
      margin-top: 0;
      color: #333;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    p {
      color: #666;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background-color: #45a049; }
    #result-box {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
    .safe { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .danger { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
  </style>
</head>
<body>
  <h2>🎣 Phishing Shield</h2>
  <p>Scan the current page URL for potential phishing threats.</p>
  
  <button id="scan-btn">Scan Current Page</button>

  <div id="result-box">
    <span id="pred"></span><br>
    <small id="conf" style="font-weight:normal"></small>
  </div>

  <script src="popup.js"></script>
</body>
</html>
